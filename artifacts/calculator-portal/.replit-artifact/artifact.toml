kind = "web"
previewPath = "/"
title = "Calculator Portal"
version = "1.0.0"
id = "artifacts/calculator-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23315

[services.development]
run = "pnpm --filter @workspace/calculator-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calculator-portal", "run", "build" ]
publicDir = "artifacts/calculator-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23315"
BASE_PATH = "/"
